name = "saijo-monthly-donation"
main = "index.js"
compatibility_date = "2024-11-01"

# 許可するオリジン（末尾スラッシュなし）
#   テスト中 : "*"（localhost を含めどこからでも許可）
#   本番公開前: 必ず本番ドメイン "https://escf.jp" に変更してください
[vars]
ALLOW_ORIGIN = "*"

# シークレット鍵は vars に書かず、下記コマンドで登録します（本番/テストで切替）：
#   npx wrangler secret put PAYJP_SECRET_KEY
#   → プロンプトに sk_test_… または sk_live_… を貼り付け

[[kv_namespaces]]
binding = "DONORS"
id = "7c1fa034d2964acebc8319982a9b3428"

# サンクスメール送信用（Cloudflare Email Sending）※現在は保留中（escf.jpのDNS移行後に有効化）
#   再開手順：下の2行のコメントを外す → npx wrangler email sending enable escf.jp → npx wrangler deploy
#   （バインディングが無い間、Workerのメール送信は自動的にスキップされます。決済には影響しません）
# [[send_email]]
# name = "EMAIL"
