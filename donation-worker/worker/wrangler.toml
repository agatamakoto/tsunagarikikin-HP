name = "saijo-monthly-donation"
main = "index.js"
compatibility_date = "2024-11-01"

# 許可するオリジン（末尾スラッシュなし）※本番運用のため escf.jp に限定済み
[vars]
ALLOW_ORIGIN = "https://escf.jp"

# シークレット鍵は vars に書かず、下記コマンドで登録します（本番/テストで切替）：
#   npx wrangler secret put PAYJP_SECRET_KEY
#   → プロンプトに sk_test_… または sk_live_… を貼り付け

[[kv_namespaces]]
binding = "DONORS"
id = "7c1fa034d2964acebc8319982a9b3428"

# サンクスメール送信（Resend経由）※Resendでescf.jpのドメイン認証（DNS）が完了してから有効化
#   1. https://resend.com でAPIキーを発行
#   2. npx wrangler secret put RESEND_API_KEY  → プロンプトにAPIキーを貼り付け
#   3. npx wrangler deploy
#   （RESEND_API_KEY が無い間、Workerのメール送信は自動的にスキップされます。決済には影響しません）
